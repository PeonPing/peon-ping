name: cesp-sounds
version: "0.1.0"
description: >
  CESP (Coding Event Sound Pack) audio notifications for Hermes.
  Maps Hermes lifecycle events to the OpenPeon CESP v1.0 standard
  and plays sound pack audio on session start, task complete, errors,
  and input-required moments.
author: Gary Sheng
requires_env: []
provides_tools: []
provides_hooks:
  - on_session_start
  - pre_tool_call
  - post_tool_call
  - on_session_end
